services:
  # Django Web Service
  - type: web
    name: b100-platform
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --no-input
    startCommand: gunicorn bluestock.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: b100-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"

# PostgreSQL Database
databases:
  - name: b100-db
    plan: free

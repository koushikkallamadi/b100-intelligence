services:
  # 1. Django Web Service
  - type: web
    name: b100-platform
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --no-input
    startCommand: gunicorn bluestock.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: b100-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: b100-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"

  # 2. Celery Worker Service
  - type: worker
    name: b100-celery-worker
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A bluestock worker -l info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: b100-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: b100-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"

  # 3. Redis Instance
  - type: redis
    name: b100-redis
    ipAllowList: []

# 4. PostgreSQL Database
databases:
  - name: b100-db
